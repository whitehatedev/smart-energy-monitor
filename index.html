<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>⚡ Energy Nexus</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        /* ============================================================
                   BASE – Default is Dark Mode
                ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 16px 16px 24px;
            transition: background 0.8s ease, color 0.6s ease;
        }

        /* ---------- Dark Mode (default) ---------- */
        body.dark-mode {
            background: #0a0e17;
            color: #e0e8f0;
        }

        /* ---------- Light Mode ---------- */
        body.light-mode {
            background: linear-gradient(180deg, #87CEEB 0%, #e0f0ff 60%, #f5f9ff 100%);
            color: #1e2a3a;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* ============================================================
                   BACKGROUNDS (Dark / Light)
                ============================================================ */
        /* Dark: stars + nebula canvas */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            transition: opacity 1.2s ease;
        }
        body.light-mode #bg-canvas {
            opacity: 0;
        }

        /* Dark: floating clouds (nebula) */
        .clouds {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
            transition: opacity 1.2s ease;
        }
        body.light-mode .clouds {
            opacity: 0;
        }

        .cloud {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            animation: floatCloud 25s ease-in-out infinite alternate;
        }
        .cloud:nth-child(1) {
            width: 600px;
            height: 200px;
            top: 5%;
            left: -10%;
            background: radial-gradient(ellipse, rgba(100, 180, 255, 0.08), transparent);
            animation-duration: 30s;
        }
        .cloud:nth-child(2) {
            width: 500px;
            height: 180px;
            bottom: 10%;
            right: -15%;
            background: radial-gradient(ellipse, rgba(200, 150, 255, 0.06), transparent);
            animation-duration: 35s;
            animation-delay: 5s;
        }
        .cloud:nth-child(3) {
            width: 400px;
            height: 150px;
            top: 40%;
            left: 50%;
            background: radial-gradient(ellipse, rgba(0, 200, 255, 0.05), transparent);
            animation-duration: 28s;
            animation-delay: 10s;
        }

        @keyframes floatCloud {
            0% {
                transform: translateX(-80px) scale(1);
                opacity: 0.5;
            }
            100% {
                transform: translateX(120px) scale(1.2);
                opacity: 0.8;
            }
        }

        /* ---------- Light Mode: Sun + Clouds ---------- */
        .light-sky {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.2s ease;
        }
        body.light-mode .light-sky {
            opacity: 1;
        }

        /* Sun */
        .sun {
            position: absolute;
            top: 5%;
            right: 10%;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffdd44, #ffaa00);
            box-shadow: 0 0 120px #ffdd4488, 0 0 60px #ffaa4488;
            animation: pulseSun 6s ease-in-out infinite;
        }
        @keyframes pulseSun {
            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 120px #ffdd4488, 0 0 60px #ffaa4488;
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 160px #ffdd44aa, 0 0 80px #ffaa44aa;
            }
        }

        /* Light clouds (day) */
        .light-cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 60px;
            filter: blur(4px);
            animation: floatCloudLight 20s ease-in-out infinite alternate;
        }
        .light-cloud:nth-child(2) {
            width: 300px;
            height: 60px;
            top: 15%;
            left: -5%;
            animation-duration: 22s;
        }
        .light-cloud:nth-child(3) {
            width: 400px;
            height: 70px;
            top: 25%;
            right: -10%;
            animation-duration: 26s;
            animation-delay: 4s;
        }
        .light-cloud:nth-child(4) {
            width: 250px;
            height: 50px;
            bottom: 20%;
            left: 20%;
            animation-duration: 18s;
            animation-delay: 8s;
        }
        .light-cloud:nth-child(5) {
            width: 350px;
            height: 65px;
            bottom: 35%;
            right: 15%;
            animation-duration: 24s;
            animation-delay: 2s;
        }

        @keyframes floatCloudLight {
            0% {
                transform: translateX(-60px);
                opacity: 0.6;
            }
            100% {
                transform: translateX(80px);
                opacity: 0.9;
            }
        }

        /* ============================================================
                   DARK EXTRAS: PLANETS & COMETS
                ============================================================ */
        .dark-extra {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 1;
            transition: opacity 1.2s ease;
        }
        body.light-mode .dark-extra {
            opacity: 0;
        }

        /* ---- Planets (orbiting around center) ---- */
        .orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            animation: spin linear infinite;
        }
        .planet {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffdd88, #cc8833);
            box-shadow: 0 0 20px rgba(255, 180, 50, 0.4);
        }
        .orbit:nth-child(1) {
            animation-duration: 18s;
        }
        .orbit:nth-child(1) .planet {
            width: 24px;
            height: 24px;
            margin-left: -12px;
            margin-top: -12px;
            transform: translateX(160px);
            background: radial-gradient(circle at 30% 30%, #ffaa66, #cc6633);
            box-shadow: 0 0 30px rgba(255, 150, 50, 0.5);
        }
        .orbit:nth-child(2) {
            animation-duration: 26s;
        }
        .orbit:nth-child(2) .planet {
            width: 16px;
            height: 16px;
            margin-left: -8px;
            margin-top: -8px;
            transform: translateX(220px);
            background: radial-gradient(circle at 30% 30%, #66ccff, #3366cc);
            box-shadow: 0 0 30px rgba(50, 150, 255, 0.5);
        }
        .orbit:nth-child(3) {
            animation-duration: 12s;
        }
        .orbit:nth-child(3) .planet {
            width: 12px;
            height: 12px;
            margin-left: -6px;
            margin-top: -6px;
            transform: translateX(110px);
            background: radial-gradient(circle at 30% 30%, #ff88aa, #cc4477);
            box-shadow: 0 0 20px rgba(255, 100, 150, 0.4);
        }
        .orbit:nth-child(4) {
            animation-duration: 32s;
        }
        .orbit:nth-child(4) .planet {
            width: 20px;
            height: 20px;
            margin-left: -10px;
            margin-top: -10px;
            transform: translateX(280px);
            background: radial-gradient(circle at 30% 30%, #88dd88, #44aa44);
            box-shadow: 0 0 30px rgba(80, 200, 80, 0.5);
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* ---- Shooting stars (comets) ---- */
        .comet {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 20px 2px rgba(255, 255, 255, 0.8);
            animation: shoot 6s linear infinite;
            opacity: 0;
        }
        .comet::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 80px;
            height: 2px;
            background: linear-gradient(to left, rgba(255, 255, 255, 0.8), transparent);
            transform: rotate(180deg);
            transform-origin: right center;
            margin-left: -80px;
            margin-top: 1px;
        }
        .comet:nth-child(1) {
            top: 10%;
            left: 20%;
            animation-delay: 2s;
        }
        .comet:nth-child(2) {
            top: 40%;
            left: 60%;
            animation-delay: 4.5s;
        }
        .comet:nth-child(3) {
            top: 70%;
            left: 10%;
            animation-delay: 7s;
        }

        @keyframes shoot {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 0;
            }
            5% {
                opacity: 1;
            }
            20% {
                transform: translate(-300px, -150px) scale(1.5);
                opacity: 1;
            }
            25% {
                opacity: 0;
            }
            100% {
                opacity: 0;
            }
        }

        /* ============================================================
                   LIGHT EXTRAS: BIRDS & BUTTERFLIES
                ============================================================ */
        .light-extra {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.2s ease;
        }
        body.light-mode .light-extra {
            opacity: 1;
        }

        /* ---- Birds (V-shape) ---- */
        .bird {
            position: absolute;
            animation: flyBird 15s linear infinite;
            opacity: 0.7;
        }
        .bird::before,
        .bird::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 6px;
            background: #2c3e50;
            border-radius: 50%;
            top: 0;
        }
        .bird::before {
            transform: rotate(-25deg);
            left: -20px;
        }
        .bird::after {
            transform: rotate(25deg);
            left: 0px;
        }
        .bird:nth-child(1) {
            top: 12%;
            left: -10%;
            animation-duration: 20s;
            animation-delay: 0s;
        }
        .bird:nth-child(2) {
            top: 25%;
            left: -20%;
            animation-duration: 25s;
            animation-delay: 4s;
            transform: scale(0.8);
        }
        .bird:nth-child(3) {
            top: 8%;
            left: -30%;
            animation-duration: 18s;
            animation-delay: 8s;
            transform: scale(0.6);
        }
        .bird:nth-child(4) {
            top: 40%;
            left: -5%;
            animation-duration: 22s;
            animation-delay: 2s;
            transform: scale(1.1);
        }

        @keyframes flyBird {
            0% {
                transform: translateX(0) translateY(0) scale(1);
                opacity: 0.7;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateX(calc(100vw + 100px)) translateY(-40px) scale(1.1);
                opacity: 0.3;
            }
        }

        /* ---- Butterflies (small fluttering) ---- */
        .butterfly {
            position: absolute;
            width: 12px;
            height: 12px;
            animation: flutter 8s ease-in-out infinite;
        }
        .butterfly::before,
        .butterfly::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 6px;
            background: #ff6699;
            border-radius: 50% 50% 0 0;
            top: 0;
            animation: flap 0.3s ease-in-out infinite alternate;
        }
        .butterfly::before {
            transform: rotate(-20deg);
            left: -8px;
            border-radius: 50% 0 50% 0;
            background: #ff8844;
        }
        .butterfly::after {
            transform: rotate(20deg);
            left: 0px;
            border-radius: 0 50% 0 50%;
            background: #ff66aa;
            animation-delay: 0.15s;
        }
        .butterfly:nth-child(5) {
            top: 50%;
            left: 20%;
            animation-duration: 10s;
            animation-delay: 1s;
        }
        .butterfly:nth-child(6) {
            top: 65%;
            left: 50%;
            animation-duration: 12s;
            animation-delay: 3s;
            transform: scale(0.7);
        }

        @keyframes flutter {
            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }
            25% {
                transform: translate(60px, -30px) rotate(5deg);
            }
            50% {
                transform: translate(120px, 10px) rotate(-3deg);
            }
            75% {
                transform: translate(180px, -20px) rotate(4deg);
            }
        }
        @keyframes flap {
            0% {
                transform: rotate(-20deg) scaleY(0.5);
            }
            100% {
                transform: rotate(20deg) scaleY(1);
            }
        }

        /* ============================================================
                   HEADER – adapts to theme
                ============================================================ */
        .header {
            text-align: center;
            padding: 28px 16px 18px;
            margin-bottom: 28px;
            border-radius: 32px;
            backdrop-filter: blur(12px);
            overflow: hidden;
            position: relative;
            transition: background 0.6s, border 0.6s, box-shadow 0.6s;
        }

        /* Dark header */
        body.dark-mode .header {
            background: rgba(16, 26, 43, 0.6);
            border: 1px solid rgba(0, 180, 255, 0.15);
            box-shadow: 0 0 60px rgba(0, 180, 255, 0.05);
        }
        body.dark-mode .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(0, 200, 255, 0.1), transparent, rgba(120, 0, 255, 0.08), transparent);
            animation: rotateGlow 18s linear infinite;
        }
        @keyframes rotateGlow {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        .header>* {
            position: relative;
            z-index: 1;
        }

        /* Light header */
        body.light-mode .header {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
        }
        body.light-mode .header::before {
            display: none;
        }

        /* ---- Title – fixed text, colour changes with theme ---- */
        #mainTitle {
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 300;
            letter-spacing: 3px;
            transition: background 0.6s ease, -webkit-text-fill-color 0.6s ease;
        }

        /* Dark mode title */
        body.dark-mode #mainTitle {
            background: linear-gradient(135deg, #00d4ff, #7b2ffc, #00d4ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 6s ease infinite;
        }

        /* Light mode title – warm gold → sky blue */
        body.light-mode #mainTitle {
            background: linear-gradient(135deg, #f7971e, #ffd200, #4facfe, #00f2fe);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShiftLight 8s ease infinite;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes gradientShiftLight {
            0% {
                background-position: 0% 50%;
            }
            33% {
                background-position: 50% 100%;
            }
            66% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* Icon colour override – we set inline style in JS */
        #mainTitle i {
            -webkit-text-fill-color: initial;
        }

        .header .subtitle {
            font-size: 0.95rem;
            margin-top: 2px;
            letter-spacing: 2px;
            font-weight: 300;
            transition: color 0.6s;
        }
        body.dark-mode .header .subtitle {
            color: rgba(180, 200, 220, 0.7);
        }
        body.light-mode .header .subtitle {
            color: rgba(30, 50, 80, 0.7);
        }

        /* ============================================================
                   STATUS BAR – adapts to theme
                ============================================================ */
        .status-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px 20px;
            flex-wrap: wrap;
            padding: 12px 24px;
            border-radius: 60px;
            margin-bottom: 28px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: background 0.6s, border 0.6s;
        }
        body.dark-mode .status-bar {
            background: rgba(16, 26, 43, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        body.light-mode .status-bar {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 5px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            transition: background 0.6s, color 0.6s, border 0.6s;
        }
        body.dark-mode .badge {
            background: rgba(255, 255, 255, 0.05);
            color: #b0c8dd;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        body.light-mode .badge {
            background: rgba(0, 0, 0, 0.04);
            color: #2a4a6a;
            border: 1px solid rgba(0, 0, 0, 0.06);
        }

        .badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        body.dark-mode .badge .dot {
            background: #4a6a8a;
        }
        body.light-mode .badge .dot {
            background: #8aabca;
        }

        .badge.online .dot {
            background: #00ff88;
            box-shadow: 0 0 16px #00ff8866;
        }
        .badge.offline .dot {
            background: #ff4466;
            box-shadow: 0 0 16px #ff446666;
        }
        .badge.online {
            border-color: rgba(0, 255, 136, 0.2);
            color: #a0f0c0;
        }
        body.light-mode .badge.online {
            border-color: rgba(0, 180, 80, 0.2);
            color: #1a7a3a;
        }
        .badge.offline {
            border-color: rgba(255, 68, 102, 0.2);
            color: #f0a0b0;
        }
        body.light-mode .badge.offline {
            border-color: rgba(200, 50, 70, 0.2);
            color: #a03040;
        }

        #auth-status {
            font-size: 0.8rem;
            transition: color 0.6s;
        }
        body.dark-mode #auth-status {
            color: #80a0c0;
        }
        body.light-mode #auth-status {
            color: #3a5a7a;
        }
        #auth-status.ok {
            color: #70d090;
        }
        body.light-mode #auth-status.ok {
            color: #2e7d32;
        }
        #auth-status.err {
            color: #e06070;
        }
        body.light-mode #auth-status.err {
            color: #c62828;
        }

        /* ---- Toggles (theme + mode) ---- */
        .toggle-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.04);
            padding: 4px 12px 4px 16px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: background 0.6s, border 0.6s;
        }
        body.light-mode .toggle-switch {
            background: rgba(0, 0, 0, 0.04);
            border-color: rgba(0, 0, 0, 0.06);
        }

        .toggle-switch label {
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.6s;
        }
        body.dark-mode .toggle-switch label {
            color: #80a0c0;
        }
        body.light-mode .toggle-switch label {
            color: #3a5a7a;
        }

        .toggle-switch input[type="checkbox"] {
            width: 40px;
            height: 22px;
            appearance: none;
            border-radius: 11px;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
            flex-shrink: 0;
            border: 1px solid transparent;
        }
        body.dark-mode .toggle-switch input[type="checkbox"] {
            background: #1a2a3a;
            border-color: #2a4a5a;
        }
        body.light-mode .toggle-switch input[type="checkbox"] {
            background: #d0d8e0;
            border-color: #b0c0d0;
        }

        .toggle-switch input[type="checkbox"]::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.3s;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        }
        body.dark-mode .toggle-switch input[type="checkbox"]::before {
            background: #4a6a8a;
        }
        body.light-mode .toggle-switch input[type="checkbox"]::before {
            background: #ffffff;
        }

        .toggle-switch input[type="checkbox"]:checked {
            border-color: #00d4ff;
        }
        body.dark-mode .toggle-switch input[type="checkbox"]:checked {
            background: #0a2a4a;
        }
        body.light-mode .toggle-switch input[type="checkbox"]:checked {
            background: #4a90d9;
        }
        .toggle-switch input[type="checkbox"]:checked::before {
            left: 20px;
        }
        body.dark-mode .toggle-switch input[type="checkbox"]:checked::before {
            background: #00d4ff;
            box-shadow: 0 0 16px #00d4ff88;
        }
        body.light-mode .toggle-switch input[type="checkbox"]:checked::before {
            background: #ffffff;
        }

        /* ============================================================
                   CARDS – adapt to theme
                ============================================================ */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            border-radius: 24px;
            padding: 20px 16px 18px;
            transition: background 0.6s, border 0.6s, box-shadow 0.6s;
            position: relative;
            overflow: hidden;
        }
        body.dark-mode .card {
            background: rgba(16, 26, 43, 0.6);

    <script>
        // ============================================================
        // STARFIELD (canvas) – only in dark mode
        // ============================================================
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function initStars(count = 180) {
            stars = [];
            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.5 + 0.5,
                    speed: Math.random() * 0.4 + 0.1,
                    opacity: Math.random() * 0.8 + 0.2,
                });
            }
        }
        initStars();

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (const star of stars) {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity * 0.6})`;
                ctx.fill();
                ctx.shadowColor = 'rgba(150, 200, 255, 0.1)';
                ctx.shadowBlur = 8;
                ctx.fill();
                ctx.shadowBlur = 0;
                star.y += star.speed * 0.15;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            }
            requestAnimationFrame(drawStars);
        }
        drawStars();

        // ============================================================
        // THEME TOGGLE – reversed logic: unchecked = dark, checked = light
        // ============================================================
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;
        const mainTitle = document.getElementById('mainTitle');

        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') {
            body.classList.remove('dark-mode');
            body.classList.add('light-mode');
            themeToggle.checked = true;   // checked = light mode
            mainTitle.innerHTML = '<i class="fas fa-sun" style="-webkit-text-fill-color: initial; color: #f7971e;"></i> Energy Nexus';
        } else {
            body.classList.add('dark-mode');
            body.classList.remove('light-mode');
            themeToggle.checked = false;  // unchecked = dark mode
            mainTitle.innerHTML = '<i class="fas fa-bolt" style="-webkit-text-fill-color: initial; color: #00d4ff;"></i> Energy Nexus';
        }

        themeToggle.addEventListener('change', function() {
            if (this.checked) {
                // Light mode
                body.classList.remove('dark-mode');
                body.classList.add('light-mode');
                localStorage.setItem('theme', 'light');
                mainTitle.innerHTML = '<i class="fas fa-sun" style="-webkit-text-fill-color: initial; color: #f7971e;"></i> Energy Nexus';
            } else {
                // Dark mode
                body.classList.remove('light-mode');
                body.classList.add('dark-mode');
                localStorage.setItem('theme', 'dark');
                mainTitle.innerHTML = '<i class="fas fa-bolt" style="-webkit-text-fill-color: initial; color: #00d4ff;"></i> Energy Nexus';
            }
        });

        // ============================================================
        // FIREBASE CONFIG & AUTH (unchanged)
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDbCMFt216kuAMoCYZlXzfqUzVeFM085Fw",
            authDomain: "energy-25d04.firebaseapp.com",
            databaseURL: "https://energy-25d04-default-rtdb.firebaseio.com",
            projectId: "energy-25d04",
            storageBucket: "energy-25d04.firebasestorage.app",
            messagingSenderId: "942953989222",
            appId: "1:942953989222:web:67e2e44bca7791a2fa59a7"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // ============================================================
        // DOM REFS (unchanged)
        // ============================================================
        const statusBadge = document.getElementById('statusBadge');
        const statusText = document.getElementById('statusText');
        const authStatusEl = document.getElementById('auth-status');
        const cardsGrid = document.getElementById('cardsGrid');
        const relayRow = document.getElementById('relayRow');
        const modeSwitch = document.getElementById('modeSwitch');

        // ============================================================
        // AUTHENTICATION (unchanged)
        // ============================================================
        const userEmail = "sb284160@gmail.com";
        const userPassword = "Password@1";

        function signIn() {
            auth.signInWithEmailAndPassword(userEmail, userPassword)
                .then(() => {
                    authStatusEl.textContent = '✅ Authenticated';
                    authStatusEl.className = 'ok';
                })
                .catch((error) => {
                    authStatusEl.textContent = '❌ Auth error: ' + error.message;
                    authStatusEl.className = 'err';
                    setTimeout(signIn, 5000);
                });
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                authStatusEl.textContent = '✅ Authenticated as ' + user.email;
                authStatusEl.className = 'ok';
                startListening();
                loadControl();
            } else {
                signIn();
            }
        });

        // ============================================================
        // FIREBASE LISTENERS (unchanged)
        // ============================================================
        let latestData = {};

        function startListening() {
            const dataRef = db.ref('energy/data');
            dataRef.orderByKey().limitToLast(1).on('child_added', (snapshot) => {
                const val = snapshot.val();
                if (val) {
                    latestData = val;
                    updateUI(val);
                    setStatus(true);
                }
            });
            dataRef.orderByKey().limitToLast(1).on('child_changed', (snapshot) => {
                const val = snapshot.val();
                if (val) {
                    latestData = val;
                    updateUI(val);
                    setStatus(true);
                }
            });
            db.ref('.info/connected').on('value', (snap) => {
                setStatus(snap.val() === true);
            });
        }

        // ============================================================
        // CONTROL (mode & relays) – unchanged
        // ============================================================
        function loadControl() {
            db.ref('control').on('value', (snapshot) => {
                const val = snapshot.val();
                if (val) {
                    if (val.mode) {
                        const isAuto = val.mode === 'AUTO';
                        modeSwitch.checked = isAuto;
                        document.querySelectorAll('.relay-btn').forEach(btn => {
                            btn.disabled = isAuto;
                        });
                    }
                }
            });
        }

        function writeControl(path, value) {
            const updates = {};
            updates[path] = value;
            db.ref('control').update(updates);
        }

        modeSwitch.addEventListener('change', function() {
            const mode = this.checked ? 'AUTO' : 'MANUAL';
            writeControl('mode', mode);
            document.querySelectorAll('.relay-btn').forEach(btn => {
                btn.disabled = this.checked;
            });
        });

        // ============================================================
        // UPDATE UI – with animated gauges (unchanged)
        // ============================================================
        function updateUI(data) {
            let cardsHtml = '';
            for (let ch = 1; ch <= 4; ch++) {
                const v = data[`voltage${ch}`] || 0;
                const c = data[`current${ch}`] || 0;
                const p = data[`power${ch}`] || 0;
                const relay = data[`relay${ch}`] || 0;
                const relayLabel = relay ? 'ON' : 'OFF';
                const relayClass = relay ? 'on' : 'off';

                const vPct = Math.min(100, (v / 300) * 100);
                const cPct = Math.min(100, (c / 10) * 100);
                const pPct = Math.min(100, (p / 3000) * 100);
                const circ = 2 * Math.PI * 30; // r=30

                cardsHtml += `
                    <div class="card">
                        <div class="channel">
                            <span>Channel ${ch}</span>
                            <span class="relay-badge ${relayClass}">${relayLabel}</span>
                        </div>

                        <div class="gauge-row">
                            <!-- Voltage -->
                            <div class="gauge-item gauge-voltage">
                                <div class="ring"></div>
                                <div class="ring"></div>
                                <svg viewBox="0 0 70 70">
                                    <circle class="bg" cx="35" cy="35" r="30" />
                                    <circle class="progress" cx="35" cy="35" r="30"
                                        stroke-dasharray="${circ}"
                                        stroke-dashoffset="${circ * (1 - vPct/100)}" />
                                </svg>
                                <span class="value">${v.toFixed(1)}</span>
                                <span class="label">V</span>
                            </div>
                            <!-- Current -->
                            <div class="gauge-item gauge-current">
                                <div class="ring"></div>
                                <div class="ring"></div>
                                <svg viewBox="0 0 70 70">
                                    <circle class="bg" cx="35" cy="35" r="30" />
                                    <circle class="progress" cx="35" cy="35" r="30"
                                        stroke-dasharray="${circ}"
                                        stroke-dashoffset="${circ * (1 - cPct/100)}" />
                                </svg>
                                <span class="value">${c.toFixed(2)}</span>
                                <span class="label">A</span>
                            </div>
                            <!-- Power -->
                            <div class="gauge-item gauge-power">
                                <div class="ring"></div>
                                <div class="ring"></div>
                                <svg viewBox="0 0 70 70">
                                    <circle class="bg" cx="35" cy="35" r="30" />
                                    <circle class="progress" cx="35" cy="35" r="30"
                                        stroke-dasharray="${circ}"
                                        stroke-dashoffset="${circ * (1 - pPct/100)}" />
                                </svg>
                                <span class="value">${p.toFixed(0)}</span>
                                <span class="label">W</span>
                            </div>
                        </div>

                        <div class="relay-status">
                            <span class="label">Relay</span>
                            <span class="state ${relayClass}">${relayLabel}</span>
                        </div>
                    </div>
                `;
            }
            cardsGrid.innerHTML = cardsHtml;

            // ---- Relay buttons ----
            const isAuto = modeSwitch.checked;
            let relayHtml = '';
            for (let ch = 1; ch <= 4; ch++) {
                const state = data[`relay${ch}`] || 0;
                const cls = state ? 'on' : 'off';
                const label = state ? 'ON' : 'OFF';
                relayHtml += `
                    <button class="relay-btn ${cls}" data-ch="${ch}" data-state="${state}" ${isAuto ? 'disabled' : ''}>
                        <span class="led"></span> Load ${ch}: ${label}
                    </button>
                `;
            }
            relayRow.innerHTML = relayHtml;

            // ---- Relay click handlers ----
            document.querySelectorAll('.relay-btn:not([disabled])').forEach(btn => {
                btn.addEventListener('click', function() {
                    const ch = this.dataset.ch;
                    const currentState = parseInt(this.dataset.state);
                    const newState = currentState ? 0 : 1;
                    writeControl('relay' + ch, newState);
                    // Optimistic update
                    this.dataset.state = newState;
                    this.className = `relay-btn ${newState ? 'on' : 'off'}`;
                    this.innerHTML = `<span class="led"></span> Load ${ch}: ${newState ? 'ON' : 'OFF'}`;
                });
            });
        }

        function setStatus(online) {
            if (online) {
                statusBadge.className = 'badge online';
                statusText.textContent = 'Connected';
            } else {
                statusBadge.className = 'badge offline';
                statusText.textContent = 'Disconnected';
            }
        }

        // Initial placeholder
        updateUI({});
        setStatus(false);
    </script>
</body>
</html>
